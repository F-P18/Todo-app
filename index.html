<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">



        <!--Header-->
        <div class="todo header">
            <input type="checkbox" id="todo-complete" data-testid="test-todo-complete-toggle" aria-labelledby="todo-label"/>
            <label for="todo-complete" class="visually-hidden" id="todo-label">
                Mark task as todo-complete
            </label>
            <span class="status" data-testid="test-todo-status">
                Pending
            </span>
        </div>

        <!--Title-->
        <h2 class="todo-title" data-testid="test-todo-title">
            Build a premium Todo card UI
        </h2>

        <!--Description-->
        <p class="todo-description" data-testid="test-todo-description">
            Create a clean, modern, and accessible todo card component using HTML, CSS and Javascript.
        </p>

        <!--Meta info-->
        <div class="todo-meta">
            <span class="priority high" data-testid="test-todo-priority">
                High
            </span>
            <time class="due-date" datetime="2026-04-16T18:00:00" data-testid="test-todo-due-date">
                Due April 16, 2026
            </time>
        </div>

        <!--Time Remaining-->
        <p class="time-remaining" data-testid="test-todo-time-remaining">
            Due in 3 days
        </p>

        <!--Tags-->
        <ul class="tags" data-testid="test-todo-tags" role="list">
            <li data-testid="test-todo-tag-work">Work</li>
            <li data-testid="test-todo-tag-urgent">Urgent</li>
            <li>Design</li>
        </ul>

        <!--Actions-->
        <div class="actions">
            <button data-testid="test-todo-edit-button">Edit</button>
            <button data-testid="test-todo-delete-button">Delete</button>
        </div>


        </article>
        

    </main>
    <script src ="script.js"></script>
    
</body>
</html>
